run_name: demo_multi_dataset
output_dir: outputs
batch_size: 1

datasets:
  - dataset_id: math_zh
    source: local
    path: examples/data/template_math_zh.jsonl
    input_column: prompt
    answer_column: answer
    limit: 3
  - dataset_id: qa_en
    source: local
    path: examples/data/template_qa_en.jsonl
    input_column: prompt
    answer_column: answer
    limit: 3

model:
  backend: openai_compatible
  task_type: llm
  model_name_or_path: Qwen/Qwen2.5-7B-Instruct
  api_base: http://127.0.0.1:8000/v1
  api_key: EMPTY
  max_new_tokens: 128
  temperature: 0.0

metrics:
  names: [exact_match, token_f1, rouge_l, char_f1]
